<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NYC Museum Tracker — From DUMBO</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@300;400;500&family=Courier+Prime&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --paper:    #f0ebe2;
  --paper-2:  #e8e2d8;
  --paper-3:  #ddd7cc;
  --cream:    #faf7f2;
  --ink:      #1c1a16;
  --ink-2:    #5c5850;
  --ink-3:    #9c9890;
  --terracotta: #b84c2a;
  --terracotta-light: #f5e8e3;
  --sage:     #4a6741;
  --sage-light: #e5ede4;
  --gold:     #8a7340;
  --gold-light: #f2edd8;
  --border:   #d4cec4;
  --border-2: #c4bdb2;
  --serif:    'Playfair Display', Georgia, serif;
  --sans:     'Jost', system-ui, sans-serif;
  --mono:     'Courier Prime', 'Courier New', monospace;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  font-weight: 300;
}

.masthead {
  background: var(--ink);
  color: var(--cream);
  padding: 3.5rem 2rem 2.5rem;
  position: relative;
  overflow: hidden;
}

.masthead::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.03) 39px, rgba(255,255,255,0.03) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.03) 39px, rgba(255,255,255,0.03) 40px);
  pointer-events: none;
}

.masthead-inner {
  max-width: 960px;
  margin: 0 auto;
  position: relative;
}

.masthead-eyebrow {
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--terracotta);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 12px;
}

.masthead-eyebrow::after {
  content: '';
  flex: 1;
  max-width: 80px;
  height: 1px;
  background: var(--terracotta);
  opacity: 0.5;
}

.masthead h1 {
  font-family: var(--serif);
  font-size: clamp(2.8rem, 7vw, 5rem);
  font-weight: 400;
  line-height: 1.0;
  letter-spacing: -0.02em;
  color: var(--cream);
  margin-bottom: 0.4rem;
}

.masthead h1 em {
  font-style: italic;
  color: #c8a882;
}

.masthead-sub {
  font-size: 0.85rem;
  color: rgba(250,247,242,0.45);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 400;
  margin-bottom: 2.5rem;
}

.stats-bar {
  display: flex;
  gap: 0;
  flex-wrap: wrap;
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 1.5rem;
  align-items: flex-end;
}

.stat-block {
  flex: 0 0 auto;
  padding-right: 2.5rem;
  margin-right: 2.5rem;
  border-right: 1px solid rgba(255,255,255,0.1);
}

.stat-block:last-of-type { border-right: none; }

.stat-num {
  font-family: var(--serif);
  font-size: 2.8rem;
  line-height: 1;
  color: var(--cream);
  font-weight: 400;
}

.stat-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(250,247,242,0.4);
  margin-top: 4px;
}

.progress-block {
  flex: 1;
  min-width: 200px;
  padding-bottom: 4px;
}

.progress-track {
  height: 2px;
  background: rgba(255,255,255,0.12);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 8px;
}

.progress-fill {
  height: 100%;
  background: var(--terracotta);
  border-radius: 99px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

.progress-text {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: rgba(250,247,242,0.4);
  letter-spacing: 0.06em;
}

.body-wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: 2rem 1.5rem 5rem;
}

.borough-tabs {
  display: flex;
  gap: 0;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1.5rem;
}

.borough-tab {
  padding: 10px 18px;
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: -1px;
  white-space: nowrap;
}

.borough-tab:hover { color: var(--ink-2); }
.borough-tab.active { color: var(--terracotta); border-bottom-color: var(--terracotta); }

.controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 1.25rem;
  align-items: center;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}

.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-3);
  pointer-events: none;
}

input[type="text"] {
  width: 100%;
  padding: 9px 12px 9px 34px;
  border: 1px solid var(--border-2);
  border-radius: 4px;
  font-family: var(--sans);
  font-size: 0.875rem;
  font-weight: 300;
  background: var(--cream);
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s;
}

input[type="text"]:focus { border-color: var(--terracotta); }
input[type="text"]::placeholder { color: var(--ink-3); }

.filter-btn {
  padding: 8px 15px;
  border: 1px solid var(--border-2);
  border-radius: 4px;
  background: var(--cream);
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.filter-btn:hover { border-color: var(--ink-3); color: var(--ink-2); }
.filter-btn.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }

.table-card {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

thead th {
  text-align: left;
  font-family: var(--mono);
  font-size: 0.62rem;
  font-weight: 400;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--paper-2);
}

.col-check { width: 38px; }
.col-num   { width: 48px; }
.col-name  { width: auto; }
.col-boro  { width: 90px; }
.col-dist  { width: 68px; }
.col-free  { width: 210px; }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}

tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #f5f0e8; }
tbody tr.done { opacity: 0.38; }
tbody tr.done .mname { text-decoration: line-through; }

td {
  padding: 11px 14px;
  vertical-align: middle;
  font-size: 0.875rem;
}

.check-cell {
  text-align: center;
  vertical-align: middle;
}

input[type="checkbox"] {
  width: 15px;
  height: 15px;
  accent-color: var(--terracotta);
  cursor: pointer;
}

.num-cell {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--ink-3);
  text-align: right;
  vertical-align: middle;
}

.mname {
  font-weight: 500;
  font-size: 0.88rem;
  color: var(--ink);
  margin-bottom: 2px;
  font-family: var(--sans);
}

.mname a {
  color: var(--ink);
  text-decoration: none;
  transition: color 0.15s;
}

.mname a:hover { color: var(--terracotta); }

.maddr {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--ink-3);
  margin-top: 1px;
}

.boro-tag {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 3px;
  white-space: nowrap;
}

.boro-bk  { background: #e8e4f0; color: #4a3f7a; }
.boro-mn  { background: var(--gold-light); color: var(--gold); }
.boro-qn  { background: var(--sage-light); color: var(--sage); }
.boro-bx  { background: var(--terracotta-light); color: var(--terracotta); }
.boro-si  { background: var(--paper-3); color: var(--ink-2); }

.dist-text {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--ink-2);
}

.free-pill {
  display: inline-block;
  font-size: 0.72rem;
  font-family: var(--sans);
  font-weight: 400;
  padding: 3px 9px;
  border-radius: 3px;
  line-height: 1.5;
}

.free-pill.yes { background: var(--sage-light); color: var(--sage); }
.free-pill.no  { background: var(--paper-2); color: var(--ink-3); }

.empty-state {
  text-align: center;
  padding: 3.5rem;
  color: var(--ink-3);
  font-family: var(--serif);
  font-style: italic;
  font-size: 1
